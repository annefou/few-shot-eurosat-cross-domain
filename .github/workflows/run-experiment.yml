name: Run Few-Shot Experiment

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  experiment:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install numpy matplotlib scipy jupytext datasets

      - name: Run experiment
        env:
          CI: "true"
        run: python 01_cross_domain_eurosat.py

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: results
          path: |
            results/cross_domain_results.json
            results/cross_domain_eurosat.png

      - name: Print results
        run: cat results/cross_domain_results.json
